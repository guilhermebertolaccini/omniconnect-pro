version: '3.8'

services:
  botflow-microservice:
    build:
      # Monorepo root — required for packages/shared-types (file: dependency)
      context: ../../../../..
      dockerfile: apps/botify/wordpress-plugin/botflow-manager/microservice/Dockerfile
    container_name: botflow-microservice
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - WORDPRESS_API_URL=${WORDPRESS_API_URL}
      - WORDPRESS_API_KEY=${WORDPRESS_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - LOVABLE_API_KEY=${LOVABLE_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - REDIS_URL=${REDIS_URL:-}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-60000}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS:-100}
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - botflow-network

  # Optional: Redis for production-grade message queue
  redis:
    image: redis:7-alpine
    container_name: botflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - botflow-network
    profiles:
      - with-redis

networks:
  botflow-network:
    driver: bridge

volumes:
  redis_data:
